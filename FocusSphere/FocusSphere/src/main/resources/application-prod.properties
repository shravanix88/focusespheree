spring.application.name=focussphere

# Server Configuration - Use PORT env var from Render/production, default to 8080
server.port=${PORT:8080}
server.servlet.context-path=/
server.compression.enabled=true
server.compression.min-response-size=1024
server.error.include-message=always
server.error.include-binding-errors=always

# Database Configuration - H2 with file persistence (can switch to MySQL/PostgreSQL via env vars)
spring.datasource.url=${DB_URL:jdbc:h2:file:/tmp/focussphere_prod;MODE=MySQL;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# H2 Console (Disabled in production for security)
spring.h2.console.enabled=false

# Logging - Production level
logging.level.root=WARN
logging.level.com.focussphere=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.file.name=/var/log/focussphere.log
logging.file.max-size=10MB
logging.file.max-history=10

# Security - Admin credentials (MUST be changed via environment variables in production)
focussphere.admin.name=${ADMIN_NAME:System Admin}
focussphere.admin.email=${ADMIN_EMAIL:admin@focussphere.com}
focussphere.admin.phone=${ADMIN_PHONE:9999999999}
focussphere.admin.rollNo=${ADMIN_ROLL_NO:ADMIN001}
focussphere.admin.password=${ADMIN_PASSWORD:ChangeThis@123}

# Session Configuration
server.servlet.session.timeout=30m
spring.session.store-type=none

# Mail Configuration (Optional)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_STARTTLS_REQUIRED:true}

# Performance and Reliability
spring.application.name=focussphere
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
spring.mail.properties.mail.smtp.socketFactory.fallback=false
