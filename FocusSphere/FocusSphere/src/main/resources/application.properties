spring.application.name=FocusSphere

# Server Configuration - Support for Render PORT environment variable
server.port=${PORT:8080}

# MySQL connection (default, override in profiles)
spring.datasource.url=jdbc:mysql://localhost:3306/focussphere_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=your_mysql_password

# JPA settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JSP view resolver
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# Session timeout
server.servlet.session.timeout=30m

# Seed admin credentials
focussphere.admin.name=System Admin
focussphere.admin.email=admin@focussphere.com
focussphere.admin.phone=9999999999
focussphere.admin.rollNo=ADMIN001
focussphere.admin.password=ChangeThis@123
