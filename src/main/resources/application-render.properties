spring.application.name=focussphere

# ============================================================================
# FocusSphere Render.com Deployment Configuration
# This profile is used when deployed on Render
# ============================================================================

# Server Configuration - Render provides PORT via environment variable
server.port=${PORT:8080}
server.servlet.context-path=/
server.compression.enabled=true
server.compression.min-response-size=1024
server.error.include-message=always
server.error.include-binding-errors=always
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ============================================================================
# ============================================================================
# Database Configuration - Uses environment variables
# IMPORTANT: For Render deployment, you MUST configure an external database
# Default: PostgreSQL (recommended for Render)
# Options: PostgreSQL, MySQL, or H2 (H2 causes data isolation issues)
# ============================================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/focussphere_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driverClassName=${DB_DRIVER:org.postgresql.Driver}

# Database Connection Pooling
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ============================================================================
# JPA/Hibernate Configuration
# ============================================================================
# Let Hibernate auto-detect the dialect. Use DDL auto as 'update' by default
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.open-in-view=false

# ============================================================================
# Logging Configuration
# ============================================================================
logging.level.root=WARN
logging.level.com.focussphere=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# Log to stdout for Render logs
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n

# H2 Console (DISABLED in production for security)
spring.h2.console.enabled=false

# ============================================================================
# Security Configuration
# Admin credentials should be set via environment variables in Render Dashboard
# ============================================================================
focussphere.admin.name=${ADMIN_NAME:System Admin}
focussphere.admin.email=${ADMIN_EMAIL:admin@focussphere.com}
focussphere.admin.phone=${ADMIN_PHONE:9999999999}
focussphere.admin.rollNo=${ADMIN_ROLL_NO:ADMIN001}
focussphere.admin.password=${ADMIN_PASSWORD:ChangeThis@123}

# ============================================================================
# Session Management
# ============================================================================
server.servlet.session.timeout=30m
spring.session.store-type=none

# ============================================================================
# JSP Configuration
# ============================================================================
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# ============================================================================
# Mail Configuration (Optional)
# Leave empty if not using email features
# ============================================================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_STARTTLS_REQUIRED:true}

# ============================================================================
# Actuator (for health checks)
# ============================================================================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
